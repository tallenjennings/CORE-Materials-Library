services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on: [db]
    volumes: [uploads:/app/uploads]
    healthcheck: { test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"], interval: 30s, timeout: 5s, retries: 3 }
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"], interval: 30s, timeout: 5s, retries: 5 }
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes: [./nginx/library.corecompass.ca.conf:/etc/nginx/conf.d/default.conf:ro, certbot_web:/var/www/certbot, letsencrypt:/etc/letsencrypt]
    depends_on: [app]
volumes: { postgres_data: {}, uploads: {}, certbot_web: {}, letsencrypt: {} }
