server { listen 80; server_name library.corecompass.ca; location /.well-known/acme-challenge/ { root /var/www/certbot; } location / { return 301 https://$host$request_uri; } }
server { listen 443 ssl http2; server_name library.corecompass.ca; ssl_certificate /etc/letsencrypt/live/library.corecompass.ca/fullchain.pem; ssl_certificate_key /etc/letsencrypt/live/library.corecompass.ca/privkey.pem; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; add_header X-Frame-Options DENY always; add_header X-Content-Type-Options nosniff always; add_header Referrer-Policy strict-origin-when-cross-origin always; client_max_body_size 8m; location / { proxy_pass http://app:3000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; } }
